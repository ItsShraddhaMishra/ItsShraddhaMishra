name: Update TRON Contributions

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-tron-contributions:
    runs-on: ubuntu-latest

    env:
      GITHUB_USERNAME: ${{ secrets.README_GITHUB_USERNAME || 'ItsShraddhaMishra' }}
      README_DISPLAY_NAME: ${{ secrets.README_DISPLAY_NAME || 'SHRADDHA MISHRA' }}
      README_THEME: ${{ secrets.README_THEME || 'red' }}
      README_GITHUB_TOKEN: ${{ secrets.README_GITHUB_TOKEN || github.token }}
      README_ASSETS_DIR: assets
      README_DATA_DIR: data

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch contribution data
        run: |
          python fetch_contributions.py

      - name: Generate TRON contribution SVG
        run: |
          python make_tron_contributions.py

      - name: Validate SVGs
        run: |
          python validate_svgs.py

      - name: Commit TRON contribution asset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/contributions.json assets/tron-contributions.svg
          git diff --cached --quiet || git commit -m "Update TRON contribution animation"
          git push
