name: Update README Assets

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "*.py"
      - "Makefile"
      - "README.md"
      - ".github/workflows/update-readme-assets.yml"

permissions:
  contents: write

jobs:
  update-readme-assets:
    runs-on: ubuntu-latest

    env:
      GITHUB_USERNAME: ${{ secrets.README_GITHUB_USERNAME || 'ItsShraddhaMishra' }}
      README_DISPLAY_NAME: ${{ secrets.README_DISPLAY_NAME || 'SHRADDHA MISHRA' }}
      README_THEME: ${{ secrets.README_THEME || 'red' }}
      README_GITHUB_TOKEN: ${{ secrets.README_GITHUB_TOKEN || github.token }}
      README_ASSETS_DIR: assets
      README_DATA_DIR: data

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests fonttools

      - name: Generate full README asset pipeline
        run: |
          make github_readme

      - name: Commit generated README assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets data README.md
          git diff --cached --quiet || git commit -m "Update README assets"
          git push
