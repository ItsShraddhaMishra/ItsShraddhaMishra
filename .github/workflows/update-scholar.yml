name: Update Google Scholar Publications

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-scholar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scholarly fonttools

      - name: Fetch Google Scholar data
        run: |
          python fetch_scholar_publications.py

      - name: Generate publication panel
        run: |
          python make_publication_panel.py

      - name: Update README publication links
        run: |
          python update_publications_readme.py

      - name: Commit updated publication data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/scholar_publications.json assets/panel-research-publications.svg README.md

          if git diff --cached --quiet; then
            echo "No Scholar updates."
          else
            git commit -m "Update Google Scholar publications"
            git push
          fi
