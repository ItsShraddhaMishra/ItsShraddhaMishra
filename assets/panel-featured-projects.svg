<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  
  <defs>

    <filter id="blueGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softBlueGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>


    <linearGradient id="panelBorder" x1="0" y1="0" x2="1200" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00e5ff"/>
      <stop offset="0.45" stop-color="#00aaff"/>
      <stop offset="1" stop-color="#66f7ff"/>
    </linearGradient>

    <linearGradient id="titleGrad" x1="250" y1="0" x2="950" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.35" stop-color="#00e5ff"/>
      <stop offset="0.72" stop-color="#00aaff"/>
      <stop offset="1" stop-color="#66f7ff"/>
    </linearGradient>

  </defs>


  
  <style>
    .panelPulse {
      animation: panelPulse 3.8s ease-in-out infinite alternate;
    }

    .lineFlow {
      stroke-dasharray: 24 18;
      animation: lineFlow 4.8s linear infinite;
    }

    .softFloat {
      animation: softFloat 6.8s ease-in-out infinite alternate;
    }

    .fadeIn1 {
      animation: fadeIn 1.2s ease-out both;
    }

    .fadeIn2 {
      animation: fadeIn 1.2s ease-out 0.25s both;
    }

    .fadeIn3 {
      animation: fadeIn 1.2s ease-out 0.45s both;
    }

    .fadeIn4 {
      animation: fadeIn 1.2s ease-out 0.65s both;
    }

    .fadeIn5 {
      animation: fadeIn 1.2s ease-out 0.85s both;
    }

    .fadeIn6 {
      animation: fadeIn 1.2s ease-out 1.05s both;
    }

    .fadeIn7 {
      animation: fadeIn 1.2s ease-out 1.25s both;
    }

    @keyframes panelPulse {
      0%   { opacity: 0.72; }
      100% { opacity: 1; }
    }

    @keyframes lineFlow {
      to { stroke-dashoffset: -180; }
    }

    @keyframes softFloat {
      0%   { transform: translateY(-3px); opacity: 0.72; }
      100% { transform: translateY(3px); opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>


  <style>
    .chipFade {
      opacity: 0;
      animation: chipFade 0.8s ease-out forwards;
    }

    @keyframes chipFade {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>

  <rect x="0" y="0" width="1200" height="560"
