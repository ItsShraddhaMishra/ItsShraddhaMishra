  </text>

  
  <line x1="120" y1="420" x2="1080" y2="420"
        stroke="#00aaff"
        stroke-opacity="0.35"
        stroke-width="1"/>
  <text x="600.0" y="130"
        text-anchor="middle"
        font-family="JetBrains Mono, Consolas, monospace"
        font-size="14"
        font-weight="900"
        letter-spacing="2.5"
        fill="#00e5ff"
        filter="url(#blueGlow)">
    CITATIONS PER YEAR
  </text>


