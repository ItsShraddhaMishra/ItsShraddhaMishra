<svg width="1200" height="590" viewBox="0 0 1200 590" fill="none" xmlns="http://www.w3.org/2000/svg">
  
  <defs>

    <filter id="blueGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softBlueGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>


    <linearGradient id="panelBorder" x1="0" y1="0" x2="1200" y2="590" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00e5ff"/>
      <stop offset="0.45" stop-color="#00aaff"/>
      <stop offset="1" stop-color="#66f7ff"/>
    </linearGradient>

    <linearGradient id="titleGrad" x1="250" y1="0" x2="950" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.35" stop-color="#00e5ff"/>
      <stop offset="0.72" stop-color="#00aaff"/>
      <stop offset="1" stop-color="#66f7ff"/>
    </linearGradient>

  </defs>


  
  <style>
    .panelPulse {
      animation: panelPulse 3.8s ease-in-out infinite alternate;
    }

    .lineFlow {
      stroke-dasharray: 24 18;
      animation: lineFlow 4.8s linear infinite;
    }

    .softFloat {
      animation: softFloat 6.8s ease-in-out infinite alternate;
    }

    .fadeIn1 {
      animation: fadeIn 1.2s ease-out both;
    }

    .fadeIn2 {
      animation: fadeIn 1.2s ease-out 0.25s both;
    }

    .fadeIn3 {
      animation: fadeIn 1.2s ease-out 0.45s both;
    }

    .fadeIn4 {
      animation: fadeIn 1.2s ease-out 0.65s both;
    }

    .fadeIn5 {
      animation: fadeIn 1.2s ease-out 0.85s both;
    }

    .fadeIn6 {
      animation: fadeIn 1.2s ease-out 1.05s both;
    }

    .fadeIn7 {
      animation: fadeIn 1.2s ease-out 1.25s both;
    }

    @keyframes panelPulse {
      0%   { opacity: 0.72; }
      100% { opacity: 1; }
    }

    @keyframes lineFlow {
      to { stroke-dashoffset: -180; }
    }

    @keyframes softFloat {
      0%   { transform: translateY(-3px); opacity: 0.72; }
      100% { transform: translateY(3px); opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>


  <rect x="0" y="0" width="1200" height="590"
        fill="#020814"
        fill-opacity="0"/>

  <text class="fadeIn1 panelPulse" x="600" y="58" text-anchor="middle"
        font-family="Orbitron, Audiowide, Rajdhani, Arial Black, sans-serif"
        font-size="20"
        font-weight="900"
        letter-spacing="5"
        fill="url(#titleGrad)"
        filter="url(#blueGlow)">
    GOOGLE SCHOLAR · PUBLICATIONS · CITATION TRAJECTORY
  </text>



  <rect x="70" y="112" width="1060" height="340" rx="20"
        fill="#061827"
        fill-opacity="0.68"
        stroke="#00e5ff"
        stroke-width="1.8"
        stroke-opacity="0.9"
        filter="url(#softBlueGlow)"/>





  <text x="90" y="182"
        font-family="JetBrains Mono, Consolas, monospace"
        font-size="13"
        font-weight="800"
        fill="#b8d8e8">
    total citations: 29 · h-index: 2 · i10-index: 1
  </text>

  <text x="90" y="205"
        font-family="JetBrains Mono, Consolas, monospace"
        font-size="11"
        font-weight="700"
        fill="#b8d8e8">
