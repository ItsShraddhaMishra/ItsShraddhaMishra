          fill="#00e5ff"
          fill-opacity="0.65"
          stroke="#66f7ff"
          stroke-width="1"
          filter="url(#softBlueGlow)"/>

    <text x="478.8" y="377.7" text-anchor="middle"
          font-family="JetBrains Mono, Consolas, monospace"
          font-size="11"
          font-weight="800"
          fill="#ffffff">
      4
    </text>

    <text x="478.8" y="442" text-anchor="middle"
          font-family="JetBrains Mono, Consolas, monospace"
          font-size="11"
          font-weight="800"
          fill="#b8d8e8">
      2024
    </text>
  </g>


  <g class="fadeIn4">
    <rect x="605.0" y="300.0" width="232.5" height="120.0" rx="5" text-anchor="middle"
          fill="#00e5ff"
          fill-opacity="0.65"
          stroke="#66f7ff"
          stroke-width="1"
          filter="url(#softBlueGlow)"/>

    <text x="721.2" y="292.0" text-anchor="middle"
          font-family="JetBrains Mono, Consolas, monospace"
          font-size="11"
          font-weight="800"
          fill="#ffffff">
      14
    </text>

    <text x="721.2" y="442" text-anchor="middle"
          font-family="JetBrains Mono, Consolas, monospace"
          font-size="11"
          font-weight="800"
          fill="#b8d8e8">
      2025
    </text>
  </g>


  <g class="fadeIn5">
    <rect x="847.5" y="342.9" width="232.5" height="77.1" rx="5" text-anchor="middle"
          fill="#00e5ff"
          fill-opacity="0.65"
          stroke="#66f7ff"
          stroke-width="1"
          filter="url(#softBlueGlow)"/>

    <text x="963.8" y="334.9" text-anchor="middle"
          font-family="JetBrains Mono, Consolas, monospace"
          font-size="11"
          font-weight="800"
          fill="#ffffff">
