  </text>

  <text class="fadeIn3" x="390" y="169"
        font-family="JetBrains Mono, Consolas, monospace"
        font-size="18" font-weight="500"
        fill="#ffffff">
    TraceFlow
  </text>


  <text class="fadeIn4" x="170" y="203"
        font-family="JetBrains Mono, Consolas, monospace"
        font-size="18" font-weight="800"
        fill="#ff3131">
    MODE
  </text>

  <text class="fadeIn4" x="360" y="203"
        font-family="JetBrains Mono, Consolas, monospace"
