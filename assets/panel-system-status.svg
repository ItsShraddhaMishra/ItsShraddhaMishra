  </text>

  <text class="fadeIn2" x="390" y="135"
        font-family="JetBrains Mono, Consolas, monospace"
        font-size="18" font-weight="500"
        fill="#ffffff">
    building
  </text>


  <text class="fadeIn3" x="170" y="169"
        font-family="JetBrains Mono, Consolas, monospace"
        font-size="18" font-weight="800"
        fill="#ff3131">
    PROJECT
  </text>

  <text class="fadeIn3" x="360" y="169"
        font-family="JetBrains Mono, Consolas, monospace"
        font-size="18" font-weight="800"
        fill="#ff7a00">
