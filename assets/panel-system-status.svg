  </text>


  <text class="fadeIn5" x="170" y="237"
        font-family="JetBrains Mono, Consolas, monospace"
        font-size="18" font-weight="800"
        fill="#ff3131">
    CORE
  </text>

  <text class="fadeIn5" x="360" y="237"
        font-family="JetBrains Mono, Consolas, monospace"
        font-size="18" font-weight="800"
        fill="#ff7a00">
    :
  </text>

  <text class="fadeIn5" x="390" y="237"
        font-family="JetBrains Mono, Consolas, monospace"
        font-size="18" font-weight="500"
        fill="#ffffff">
    reproducibility · automation · evaluation
  </text>


  <text class="fadeIn6" x="170" y="271"
        font-family="JetBrains Mono, Consolas, monospace"
