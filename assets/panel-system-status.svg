  </text>


    <!-- footer signal -->
    <text class="softFloat" x="600" y="400" text-anchor="middle"
          font-family="JetBrains Mono, Consolas, monospace"
          font-size="20" font-weight="800" letter-spacing="3"
          fill="#b8b8b8">
