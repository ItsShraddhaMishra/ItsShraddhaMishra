<svg width="1200" height="76" viewBox="0 0 1200 76" fill="none" xmlns="http://www.w3.org/2000/svg">
  
  <defs>
    <linearGradient id="section-research-publications_svg_bg" x1="0" y1="0" x2="1200" y2="76" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020202"/>
      <stop offset="0.45" stop-color="#110000"/>
      <stop offset="0.78" stop-color="#2d0000"/>
      <stop offset="1" stop-color="#ff7a00"/>
    </linearGradient>

    <radialGradient id="section-research-publications_svg_wheelGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ff3131" stop-opacity="0.18"/>
      <stop offset="0.55" stop-color="#ff3131" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#ff3131" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="section-research-publications_svg_wheelGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ff7a00" stop-opacity="0.15"/>
      <stop offset="0.65" stop-color="#ff7a00" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ff7a00" stop-opacity="0"/>
    </radialGradient>

    <pattern id="section-research-publications_svg_grid" width="52" height="52" patternUnits="userSpaceOnUse">
      <path d="M 52 0 L 0 0 0 52" fill="none" stroke="#5d0a0a" stroke-width="1" opacity="0.45"/>
    </pattern>

    <linearGradient id="section-research-publications_svg_scanLine" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff3131" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ff3131" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ff3131" stop-opacity="0"/>
    </linearGradient>

    <filter id="section-research-publications_svg_glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="section-research-publications_svg_softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .section-research-publications_svg_scan {
      animation: section-research-publications_svg_scanMove 4.8s linear infinite;
    }

    .section-research-publications_svg_pulse {
      animation: section-research-publications_svg_pulse 2.8s ease-in-out infinite alternate;
    }

    .section-research-publications_svg_pulseSlow {
      animation: section-research-publications_svg_pulseSlow 5.2s ease-in-out infinite alternate;
    }

    .section-research-publications_svg_spinCW {
      transform-origin: 936px 31px;
      animation: section-research-publications_svg_spinCW 16s linear infinite;
    }

    .section-research-publications_svg_spinCCW {
      transform-origin: 936px 31px;
      animation: section-research-publications_svg_spinCCW 22s linear infinite;
    }

    .section-research-publications_svg_spinLeft {
      transform-origin: 216px 53px;
      animation: section-research-publications_svg_spinLeft 18s linear infinite;
    }

    .section-research-publications_svg_dash {
      stroke-dasharray: 14 12;
      animation: section-research-publications_svg_dashMove 4s linear infinite;
    }

    .section-research-publications_svg_float {
      animation: section-research-publications_svg_float 6s ease-in-out infinite alternate;
    }

    @keyframes section-research-publications_svg_scanMove {
      0%   { transform: translateY(-60px); opacity: 0; }
      12%  { opacity: 0.9; }
      50%  { opacity: 0.5; }
      100% { transform: translateY(156px); opacity: 0; }
    }

    @keyframes section-research-publications_svg_pulse {
      0%   { opacity: 0.45; }
      100% { opacity: 1; }
    }

    @keyframes section-research-publications_svg_pulseSlow {
      0%   { opacity: 0.18; }
      100% { opacity: 0.52; }
    }

    @keyframes section-research-publications_svg_spinCW {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes section-research-publications_svg_spinCCW {
      from { transform: rotate(360deg); }
      to   { transform: rotate(0deg); }
    }

    @keyframes section-research-publications_svg_spinLeft {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-360deg); }
    }

    @keyframes section-research-publications_svg_dashMove {
      to { stroke-dashoffset: -120; }
    }

    @keyframes section-research-publications_svg_float {
      0%   { transform: translateX(-12px); opacity: 0.55; }
      100% { transform: translateX(12px); opacity: 0.95; }
    }
  </style>

  <rect width="1200" height="76" fill="url(#section-research-publications_svg_bg)"/>
  <rect width="1200" height="76" fill="url(#section-research-publications_svg_grid)" opacity="0.72"/>

  <rect class="section-research-publications_svg_scan" x="0" y="0" width="1200" height="22" fill="url(#section-research-publications_svg_scanLine)" opacity="0.75"/>

  <!-- ambient glow fields -->
  <circle class="section-research-publications_svg_pulseSlow" cx="936" cy="31" r="27" fill="url(#section-research-publications_svg_wheelGlow)"/>
  <circle class="section-research-publications_svg_pulseSlow" cx="216" cy="53" r="10" fill="url(#section-research-publications_svg_wheelGlow2)"/>

  <!-- main wheel -->
  <g class="section-research-publications_svg_spinCW" opacity="0.15">
    <circle cx="936" cy="31" r="13" fill="none" stroke="#ff3131" stroke-width="2" filter="url(#section-research-publications_svg_glow)"/>
    <circle cx="936" cy="31" r="20" fill="none" stroke="#ff7a00" stroke-width="2" filter="url(#section-research-publications_svg_glow)"/>
    <circle cx="936" cy="31" r="27" fill="none" stroke="#ff3131" stroke-width="1.5" opacity="0.7" filter="url(#section-research-publications_svg_softGlow)"/>

    <line x1="909" y1="31" x2="963" y2="31" stroke="#ff3131" stroke-width="1.5" opacity="0.6"/>
    <line x1="936" y1="4" x2="936" y2="58" stroke="#ff7a00" stroke-width="1.5" opacity="0.6"/>
    <line x1="916" y1="11" x2="956" y2="51" stroke="#ff3131" stroke-width="1.2" opacity="0.45"/>
    <line x1="916" y1="51" x2="956" y2="11" stroke="#ff7a00" stroke-width="1.2" opacity="0.45"/>
  </g>

  <!-- counter-rotating wheel segments -->
  <g class="section-research-publications_svg_spinCCW" opacity="0.15">
    <path d="M 916 31 A 20 20 0 0 1 936 11" fill="none" stroke="#ff3131" stroke-width="3" filter="url(#section-research-publications_svg_glow)"/>
    <path d="M 936 11 A 20 20 0 0 1 956 31" fill="none" stroke="#ff7a00" stroke-width="3" filter="url(#section-research-publications_svg_glow)"/>
    <path d="M 956 31 A 20 20 0 0 1 936 51" fill="none" stroke="#ff3131" stroke-width="3" filter="url(#section-research-publications_svg_glow)"/>
    <path d="M 936 51 A 20 20 0 0 1 916 31" fill="none" stroke="#ff7a00" stroke-width="3" filter="url(#section-research-publications_svg_glow)"/>
  </g>

  <!-- secondary left wheel -->
  <g class="section-research-publications_svg_spinLeft" opacity="0.15">
    <circle cx="216" cy="53" r="10" fill="none" stroke="#ff7a00" stroke-width="1.8" filter="url(#section-research-publications_svg_glow)"/>
    <circle cx="216" cy="53" r="6" fill="none" stroke="#ff3131" stroke-width="1.3" filter="url(#section-research-publications_svg_glow)"/>
    <line x1="206" y1="53" x2="226" y2="53" stroke="#ff7a00" stroke-width="1"/>
    <line x1="216" y1="43" x2="216" y2="63" stroke="#ff3131" stroke-width="1"/>
  </g>

  <!-- horizon / laser terrain -->
  <path class="section-research-publications_svg_pulse" d="M0 60 C 180 53 264 66 432 59 C 660 49 804 65 983 57 C 1104 53 1164 57 1200 51 V 76 H 0 Z"
        fill="#ff3131" opacity="0.10"/>

  <path class="section-research-publications_svg_dash" d="M0 63 C 216 54 312 69 480 61 C 696 50 864 67 1056 60 C 1140 56 1176 54 1200 53"
        fill="none" stroke="#ff3131" stroke-width="2.4" opacity="0.95" filter="url(#section-research-publications_svg_glow)"/>

  <line class="section-research-publications_svg_float" x1="96" y1="13" x2="1104" y2="13" stroke="#ff3131" stroke-width="1.8" opacity="0.65" filter="url(#section-research-publications_svg_glow)"/>
  <line class="section-research-publications_svg_float" x1="192" y1="54" x2="1008" y2="54" stroke="#ff7a00" stroke-width="1.6" opacity="0.55"/>


  <defs>
    <linearGradient id="bar" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a0400" stop-opacity="0.86"/>
      <stop offset="0.5" stop-color="#361000" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#1a0400" stop-opacity="0.86"/>
    </linearGradient>

    <filter id="redGlow" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .edge {
      stroke-dasharray: 14 12;
      animation: dashMove 3.8s linear infinite;
    }

    .pulse {
      animation: pulseGlow 2.8s ease-in-out infinite alternate;
    }

    @keyframes dashMove {
      to { stroke-dashoffset: -120; }
    }

    @keyframes pulseGlow {
      0% { opacity: 0.68; }
      100% { opacity: 1; }
    }
  </style>

  <rect x="8" y="8" width="1184" height="60" rx="8" fill="url(#bar)" stroke="#ff7a00" stroke-width="2"/>
  <rect x="8" y="8" width="1184" height="60" rx="8" fill="none" stroke="#ff7a00" stroke-opacity="0.28" stroke-width="1"/>

