<svg width="1200" height="310" viewBox="0 0 1200 310" fill="none" xmlns="http://www.w3.org/2000/svg">
  
  <defs>
    <linearGradient id="headerBg_bg" x1="0" y1="0" x2="1200" y2="310" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020202"/>
      <stop offset="0.45" stop-color="#110000"/>
      <stop offset="0.78" stop-color="#2d0000"/>
      <stop offset="1" stop-color="#ff7a00"/>
    </linearGradient>

    <radialGradient id="headerBg_wheelGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ff3131" stop-opacity="0.18"/>
      <stop offset="0.55" stop-color="#ff3131" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#ff3131" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="headerBg_wheelGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ff7a00" stop-opacity="0.15"/>
      <stop offset="0.65" stop-color="#ff7a00" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ff7a00" stop-opacity="0"/>
    </radialGradient>

    <pattern id="headerBg_grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M 38 0 L 0 0 0 38" fill="none" stroke="#5d0a0a" stroke-width="1" opacity="0.45"/>
    </pattern>

    <linearGradient id="headerBg_scanLine" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff3131" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ff3131" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ff3131" stop-opacity="0"/>
    </linearGradient>

    <filter id="headerBg_glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="headerBg_softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .headerBg_scan {
      animation: headerBg_scanMove 4.8s linear infinite;
    }

    .headerBg_pulse {
      animation: headerBg_pulse 2.8s ease-in-out infinite alternate;
    }

    .headerBg_pulseSlow {
      animation: headerBg_pulseSlow 5.2s ease-in-out infinite alternate;
    }

    .headerBg_spinCW {
      transform-origin: 936px 130px;
      animation: headerBg_spinCW 16s linear infinite;
    }

    .headerBg_spinCCW {
      transform-origin: 936px 130px;
      animation: headerBg_spinCCW 22s linear infinite;
    }

    .headerBg_spinLeft {
      transform-origin: 216px 217px;
      animation: headerBg_spinLeft 18s linear infinite;
    }

    .headerBg_dash {
      stroke-dasharray: 14 12;
      animation: headerBg_dashMove 4s linear infinite;
    }

    .headerBg_float {
      animation: headerBg_float 6s ease-in-out infinite alternate;
    }

    @keyframes headerBg_scanMove {
      0%   { transform: translateY(-60px); opacity: 0; }
      12%  { opacity: 0.9; }
      50%  { opacity: 0.5; }
      100% { transform: translateY(390px); opacity: 0; }
    }

    @keyframes headerBg_pulse {
      0%   { opacity: 0.45; }
      100% { opacity: 1; }
    }

    @keyframes headerBg_pulseSlow {
      0%   { opacity: 0.18; }
      100% { opacity: 0.52; }
    }

    @keyframes headerBg_spinCW {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes headerBg_spinCCW {
      from { transform: rotate(360deg); }
      to   { transform: rotate(0deg); }
    }

    @keyframes headerBg_spinLeft {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-360deg); }
    }

    @keyframes headerBg_dashMove {
      to { stroke-dashoffset: -120; }
    }

    @keyframes headerBg_float {
      0%   { transform: translateX(-12px); opacity: 0.55; }
      100% { transform: translateX(12px); opacity: 0.95; }
    }
  </style>

  <rect width="1200" height="310" fill="url(#headerBg_bg)"/>
  <rect width="1200" height="310" fill="url(#headerBg_grid)" opacity="0.72"/>

  <rect class="headerBg_scan" x="0" y="0" width="1200" height="22" fill="url(#headerBg_scanLine)" opacity="0.75"/>

  <!-- ambient glow fields -->
  <circle class="headerBg_pulseSlow" cx="936" cy="130" r="111" fill="url(#headerBg_wheelGlow)"/>
  <circle class="headerBg_pulseSlow" cx="216" cy="217" r="43" fill="url(#headerBg_wheelGlow2)"/>

  <!-- main wheel -->
  <g class="headerBg_spinCW" opacity="0.24">
    <circle cx="936" cy="130" r="55" fill="none" stroke="#ff3131" stroke-width="2" filter="url(#headerBg_glow)"/>
    <circle cx="936" cy="130" r="83" fill="none" stroke="#ff7a00" stroke-width="2" filter="url(#headerBg_glow)"/>
    <circle cx="936" cy="130" r="111" fill="none" stroke="#ff3131" stroke-width="1.5" opacity="0.7" filter="url(#headerBg_softGlow)"/>

    <line x1="825" y1="130" x2="1047" y2="130" stroke="#ff3131" stroke-width="1.5" opacity="0.6"/>
    <line x1="936" y1="19" x2="936" y2="241" stroke="#ff7a00" stroke-width="1.5" opacity="0.6"/>
    <line x1="853" y1="47" x2="1019" y2="213" stroke="#ff3131" stroke-width="1.2" opacity="0.45"/>
    <line x1="853" y1="213" x2="1019" y2="47" stroke="#ff7a00" stroke-width="1.2" opacity="0.45"/>
  </g>

  <!-- counter-rotating wheel segments -->
  <g class="headerBg_spinCCW" opacity="0.24">
    <path d="M 853 130 A 83 83 0 0 1 936 47" fill="none" stroke="#ff3131" stroke-width="3" filter="url(#headerBg_glow)"/>
    <path d="M 936 47 A 83 83 0 0 1 1019 130" fill="none" stroke="#ff7a00" stroke-width="3" filter="url(#headerBg_glow)"/>
    <path d="M 1019 130 A 83 83 0 0 1 936 213" fill="none" stroke="#ff3131" stroke-width="3" filter="url(#headerBg_glow)"/>
    <path d="M 936 213 A 83 83 0 0 1 853 130" fill="none" stroke="#ff7a00" stroke-width="3" filter="url(#headerBg_glow)"/>
  </g>

  <!-- secondary left wheel -->
  <g class="headerBg_spinLeft" opacity="0.24">
    <circle cx="216" cy="217" r="43" fill="none" stroke="#ff7a00" stroke-width="1.8" filter="url(#headerBg_glow)"/>
    <circle cx="216" cy="217" r="26" fill="none" stroke="#ff3131" stroke-width="1.3" filter="url(#headerBg_glow)"/>
    <line x1="173" y1="217" x2="259" y2="217" stroke="#ff7a00" stroke-width="1"/>
    <line x1="216" y1="174" x2="216" y2="260" stroke="#ff3131" stroke-width="1"/>
  </g>

  <!-- horizon / laser terrain -->
  <path class="headerBg_pulse" d="M0 248 C 180 217 264 272 432 241 C 660 201 804 266 983 235 C 1104 217 1164 232 1200 210 V 310 H 0 Z"
        fill="#ff3131" opacity="0.10"/>

  <path class="headerBg_dash" d="M0 260 C 216 223 312 285 480 251 C 696 207 864 275 1056 244 C 1140 229 1176 223 1200 217"
        fill="none" stroke="#ff3131" stroke-width="2.4" opacity="0.95" filter="url(#headerBg_glow)"/>

  <line class="headerBg_float" x1="96" y1="55" x2="1104" y2="55" stroke="#ff3131" stroke-width="1.8" opacity="0.65" filter="url(#headerBg_glow)"/>
  <line class="headerBg_float" x1="192" y1="223" x2="1008" y2="223" stroke="#ff7a00" stroke-width="1.6" opacity="0.55"/>


  <defs>
    <linearGradient id="nameGrad" x1="270" y1="0" x2="930" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.38" stop-color="#ff3131"/>
      <stop offset="0.72" stop-color="#ff1e1e"/>
      <stop offset="1" stop-color="#ff7a00"/>
    </linearGradient>

    <filter id="redGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g opacity="0.95">
    <g fill="url(#nameGrad)" filter="url(#redGlow)">
<path d="M23.634000000000015 125.85Q13.734000000000012 125.85 13.734000000000012 115.95H73.00200000000001Q82.90200000000002 115.95 82.90200000000002 125.85V134.1Q82.90200000000002 144.0 73.00200000000001 144.0H13.734000000000012V134.1H72.21000000000001V125.85ZM13.734000000000012 107.69999999999999Q13.734000000000012 97.8 23.634000000000015 97.8H82.90200000000002V107.69999999999999Z"/>
