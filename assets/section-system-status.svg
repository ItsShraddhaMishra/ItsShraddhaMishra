<path d="M807.2950000000002 39.75Q802.7950000000002 39.75 802.7950000000002 35.25H829.7350000000002Q834.2350000000002 35.25 834.2350000000002 39.75V43.5Q834.2350000000002 48.0 829.7350000000002 48.0H802.7950000000002V43.5H829.3750000000002V39.75ZM802.7950000000002 31.5Q802.7950000000002 27.0 807.2950000000002 27.0H834.2350000000002V31.5Z"/>
</g>
  </g>
</svg>