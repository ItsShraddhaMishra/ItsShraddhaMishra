  <path d="M408.895 27.0 419.42499999999995 36.96 429.955 27.0H437.155L421.85499999999996 40.83V48.0H416.99499999999995V40.83L401.695 27.0Z"/>
  <path d="M448.145 39.75Q443.645 39.75 443.645 35.25H470.585Q475.085 35.25 475.085 39.75V43.5Q475.085 48.0 470.585 48.0H443.645V43.5H470.22499999999997V39.75ZM443.645 31.5Q443.645 27.0 448.145 27.0H475.085V31.5Z"/>
  <path d="M493.515 31.5H481.815V27.0H510.075V31.5H498.375V48.0H493.515Z"/>
  <path d="M540.4449999999999 35.25V39.75H521.665V43.5H547.045V48.0H516.805V35.25ZM516.805 31.5V27.0H547.045V31.5Z"/>
  <path d="M584.495 48.0V35.519999999999996L571.985 43.26L559.475 35.519999999999996V48.0H554.615V26.85L571.985 37.59L589.355 26.85V48.0Z"/>
  <path d="M620.875 39.75Q616.375 39.75 616.375 35.25H643.315Q647.815 35.25 647.815 39.75V43.5Q647.815 48.0 643.315 48.0H616.375V43.5H642.955V39.75ZM616.375 31.5Q616.375 27.0 620.875 27.0H647.815V31.5Z"/>
  <path d="M666.245 31.5H654.5450000000001V27.0H682.8050000000001V31.5H671.105V48.0H666.245Z"/>
  <path d="M704.1150000000001 27.0H709.0350000000001L725.1450000000001 48.0H719.085L716.205 44.1H701.2650000000001L704.5950000000001 39.6H712.8750000000001L706.575 31.080000000000002L694.065 48.0H688.0050000000001Z"/>
  <path d="M742.0450000000001 31.5H730.3450000000001V27.0H758.6050000000001V31.5H746.9050000000001V48.0H742.0450000000001Z"/>
  <path d="M796.7750000000002 27.0V43.5Q796.7750000000002 48.0 792.2750000000002 48.0H769.8350000000002Q765.3350000000002 48.0 765.3350000000002 43.5V27.0H770.1950000000002V43.5H791.9150000000002V27.0Z"/>
  <path d="M809.2950000000002 39.75Q804.7950000000002 39.75 804.7950000000002 35.25H831.7350000000002Q836.2350000000002 35.25 836.2350000000002 39.75V43.5Q836.2350000000002 48.0 831.7350000000002 48.0H804.7950000000002V43.5H831.3750000000002V39.75ZM804.7950000000002 31.5Q804.7950000000002 27.0 809.2950000000002 27.0H836.2350000000002V31.5Z"/>
</g>
  </g>
</svg>