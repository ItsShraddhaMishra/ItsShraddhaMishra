<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  
  <defs>
    <linearGradient id="identityPanel_bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050008"/>
      <stop offset="0.45" stop-color="#14001f"/>
      <stop offset="0.78" stop-color="#2b003d"/>
      <stop offset="1" stop-color="#b026ff"/>
    </linearGradient>

    <radialGradient id="identityPanel_wheelGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#d86cff" stop-opacity="0.18"/>
      <stop offset="0.55" stop-color="#d86cff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#d86cff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="identityPanel_wheelGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#b026ff" stop-opacity="0.15"/>
      <stop offset="0.65" stop-color="#b026ff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#b026ff" stop-opacity="0"/>
    </radialGradient>

    <pattern id="identityPanel_grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M 38 0 L 0 0 0 38" fill="none" stroke="#4f1266" stroke-width="1" opacity="0.45"/>
    </pattern>

    <linearGradient id="identityPanel_scanLine" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d86cff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#d86cff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#d86cff" stop-opacity="0"/>
    </linearGradient>

    <filter id="identityPanel_glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="identityPanel_softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .identityPanel_scan {
      animation: identityPanel_scanMove 4.8s linear infinite;
    }

    .identityPanel_pulse {
      animation: identityPanel_pulse 2.8s ease-in-out infinite alternate;
    }

    .identityPanel_pulseSlow {
      animation: identityPanel_pulseSlow 5.2s ease-in-out infinite alternate;
    }

    .identityPanel_spinCW {
      transform-origin: 936px 218px;
      animation: identityPanel_spinCW 16s linear infinite;
    }

    .identityPanel_spinCCW {
      transform-origin: 936px 218px;
      animation: identityPanel_spinCCW 22s linear infinite;
    }

    .identityPanel_spinLeft {
      transform-origin: 216px 364px;
      animation: identityPanel_spinLeft 18s linear infinite;
    }

    .identityPanel_dash {
      stroke-dasharray: 14 12;
      animation: identityPanel_dashMove 4s linear infinite;
    }

    .identityPanel_float {
      animation: identityPanel_float 6s ease-in-out infinite alternate;
    }

    @keyframes identityPanel_scanMove {
      0%   { transform: translateY(-60px); opacity: 0; }
      12%  { opacity: 0.9; }
      50%  { opacity: 0.5; }
      100% { transform: translateY(600px); opacity: 0; }
    }

    @keyframes identityPanel_pulse {
      0%   { opacity: 0.45; }
      100% { opacity: 1; }
    }

    @keyframes identityPanel_pulseSlow {
      0%   { opacity: 0.18; }
      100% { opacity: 0.52; }
    }

    @keyframes identityPanel_spinCW {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes identityPanel_spinCCW {
      from { transform: rotate(360deg); }
      to   { transform: rotate(0deg); }
    }

    @keyframes identityPanel_spinLeft {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-360deg); }
    }

    @keyframes identityPanel_dashMove {
      to { stroke-dashoffset: -120; }
    }

    @keyframes identityPanel_float {
      0%   { transform: translateX(-12px); opacity: 0.55; }
      100% { transform: translateX(12px); opacity: 0.95; }
    }
  </style>

  <rect width="1200" height="520" fill="url(#identityPanel_bg)"/>
  <rect width="1200" height="520" fill="url(#identityPanel_grid)" opacity="0.72"/>

  <rect class="identityPanel_scan" x="0" y="0" width="1200" height="22" fill="url(#identityPanel_scanLine)" opacity="0.75"/>

  <!-- ambient glow fields -->
  <circle class="identityPanel_pulseSlow" cx="936" cy="218" r="187" fill="url(#identityPanel_wheelGlow)"/>
  <circle class="identityPanel_pulseSlow" cx="216" cy="364" r="72" fill="url(#identityPanel_wheelGlow2)"/>

  <!-- main wheel -->
  <g class="identityPanel_spinCW" opacity="0.18">
    <circle cx="936" cy="218" r="93" fill="none" stroke="#d86cff" stroke-width="2" filter="url(#identityPanel_glow)"/>
    <circle cx="936" cy="218" r="140" fill="none" stroke="#b026ff" stroke-width="2" filter="url(#identityPanel_glow)"/>
    <circle cx="936" cy="218" r="187" fill="none" stroke="#d86cff" stroke-width="1.5" opacity="0.7" filter="url(#identityPanel_softGlow)"/>

    <line x1="749" y1="218" x2="1123" y2="218" stroke="#d86cff" stroke-width="1.5" opacity="0.6"/>
    <line x1="936" y1="31" x2="936" y2="405" stroke="#b026ff" stroke-width="1.5" opacity="0.6"/>
    <line x1="796" y1="78" x2="1076" y2="358" stroke="#d86cff" stroke-width="1.2" opacity="0.45"/>
    <line x1="796" y1="358" x2="1076" y2="78" stroke="#b026ff" stroke-width="1.2" opacity="0.45"/>
  </g>

  <!-- counter-rotating wheel segments -->
  <g class="identityPanel_spinCCW" opacity="0.18">
    <path d="M 796 218 A 140 140 0 0 1 936 78" fill="none" stroke="#d86cff" stroke-width="3" filter="url(#identityPanel_glow)"/>
    <path d="M 936 78 A 140 140 0 0 1 1076 218" fill="none" stroke="#b026ff" stroke-width="3" filter="url(#identityPanel_glow)"/>
    <path d="M 1076 218 A 140 140 0 0 1 936 358" fill="none" stroke="#d86cff" stroke-width="3" filter="url(#identityPanel_glow)"/>
    <path d="M 936 358 A 140 140 0 0 1 796 218" fill="none" stroke="#b026ff" stroke-width="3" filter="url(#identityPanel_glow)"/>
  </g>

  <!-- secondary left wheel -->
  <g class="identityPanel_spinLeft" opacity="0.18">
    <circle cx="216" cy="364" r="72" fill="none" stroke="#b026ff" stroke-width="1.8" filter="url(#identityPanel_glow)"/>
    <circle cx="216" cy="364" r="44" fill="none" stroke="#d86cff" stroke-width="1.3" filter="url(#identityPanel_glow)"/>
    <line x1="144" y1="364" x2="288" y2="364" stroke="#b026ff" stroke-width="1"/>
    <line x1="216" y1="292" x2="216" y2="436" stroke="#d86cff" stroke-width="1"/>
  </g>

  <!-- horizon / laser terrain -->
  <path class="identityPanel_pulse" d="M0 416 C 180 364 264 457 432 405 C 660 338 804 447 983 395 C 1104 364 1164 390 1200 353 V 520 H 0 Z"
        fill="#d86cff" opacity="0.10"/>

  <path class="identityPanel_dash" d="M0 436 C 216 374 312 478 480 421 C 696 348 864 462 1056 410 C 1140 384 1176 374 1200 364"
        fill="none" stroke="#d86cff" stroke-width="2.4" opacity="0.95" filter="url(#identityPanel_glow)"/>

  <line class="identityPanel_float" x1="96" y1="93" x2="1104" y2="93" stroke="#d86cff" stroke-width="1.8" opacity="0.65" filter="url(#identityPanel_glow)"/>
  <line class="identityPanel_float" x1="192" y1="374" x2="1008" y2="374" stroke="#b026ff" stroke-width="1.6" opacity="0.55"/>


  <defs>
    <filter id="violetGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softVioletGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="panelBorder" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d86cff"/>
      <stop offset="0.45" stop-color="#b026ff"/>
      <stop offset="1" stop-color="#4f1266"/>
    </linearGradient>

    <linearGradient id="titleGrad" x1="250" y1="0" x2="950" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.35" stop-color="#d86cff"/>
      <stop offset="0.72" stop-color="#b026ff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <style>
    .panelPulse {
      animation: panelPulse 3.8s ease-in-out infinite alternate;
    }

    .lineFlow {
      stroke-dasharray: 24 18;
      animation: lineFlow 4.8s linear infinite;
    }

    .softFloat {
      animation: softFloat 6.8s ease-in-out infinite alternate;
    }

    .fadeIn1 {
      animation: fadeIn 1.2s ease-out both;
    }

    .fadeIn2 {
      animation: fadeIn 1.2s ease-out 0.35s both;
    }

    .fadeIn3 {
      animation: fadeIn 1.2s ease-out 0.7s both;
    }

    .fadeIn4 {
      animation: fadeIn 1.2s ease-out 1.05s both;
    }

    @keyframes panelPulse {
      0%   { opacity: 0.72; }
      100% { opacity: 1; }
    }

    @keyframes lineFlow {
      to { stroke-dashoffset: -180; }
    }

    @keyframes softFloat {
      0%   { transform: translateY(-4px); opacity: 0.72; }
      100% { transform: translateY(4px); opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>

  <!-- glass panel -->
  <rect x="58" y="54" width="1084" height="412" rx="22"
        fill="#050008" fill-opacity="0.76"
        stroke="url(#panelBorder)" stroke-width="2.5"
        filter="url(#softVioletGlow)"/>

  <rect x="78" y="76" width="1044" height="368" rx="16"
        fill="#14001f" fill-opacity="0.38"
        stroke="#4f1266" stroke-width="1"
        stroke-opacity="0.85"/>

  <!-- corner geometry -->
  <path class="lineFlow" d="M92 112 H245" stroke="#d86cff" stroke-width="2.5" filter="url(#violetGlow)"/>
  <path class="lineFlow" d="M955 112 H1108" stroke="#b026ff" stroke-width="2.5" filter="url(#violetGlow)"/>
  <path class="lineFlow" d="M92 408 H245" stroke="#b026ff" stroke-width="2.5" filter="url(#violetGlow)"/>
  <path class="lineFlow" d="M955 408 H1108" stroke="#d86cff" stroke-width="2.5" filter="url(#violetGlow)"/>

  <!-- title -->
  <text class="fadeIn1" x="600" y="124" text-anchor="middle"
        font-family="JetBrains Mono, Consolas, monospace"
        font-size="20" font-weight="800" letter-spacing="5"
        fill="#b8b8b8">
    PERMANENCE CODE
  </text>

  <text class="fadeIn1 panelPulse" x="600" y="166" text-anchor="middle"
        font-family="Orbitron, Audiowide, Rajdhani, Arial Black, sans-serif"
        font-size="30" font-weight="900" letter-spacing="4"
        fill="url(#titleGrad)" filter="url(#violetGlow)">
    INTELLIGENT SYSTEMS SAVE COGNITIVE ENERGY
  </text>

  <!-- hook -->
  <text class="fadeIn2" x="600" y="222" text-anchor="middle"
        font-family="JetBrains Mono, Consolas, monospace"
        font-size="18" font-weight="500"
        fill="#ffffff">
    <tspan x="600" dy="0">My creative ideas become code for research that serve the real world —</tspan>
    <tspan x="600" dy="30">where an experiment stops being a temporary run and becomes part of a stable, traceable system.</tspan>
  </text>

  <!-- body -->
  <text class="fadeIn3" x="600" y="300" text-anchor="middle"
        font-family="JetBrains Mono, Consolas, monospace"
        font-size="17" font-weight="500"
        fill="#d8c7ff">
    <tspan x="600" dy="0">I build machine learning research systems in the spirit of </tspan>
    <tspan fill="#d86cff" font-weight="800">permanence code</tspan>
    <tspan>: stable, reproducible,</tspan>
    <tspan x="600" dy="30">auditable, and extensible by design. My work lives in the deep amethyst space between</tspan>
    <tspan x="600" dy="30">human intention and digital execution, where glowing lines of automation turn uncertainty into structure.</tspan>
  </text>

  <!-- Core Coding Principles -->
  <text class="fadeIn4" x="600" y="404" text-anchor="middle"
        font-family="JetBrains Mono, Consolas, monospace"
        font-size="17" font-weight="500"
        fill="#ffffff">
    <tspan x="600" dy="0">My work is grounded in synthesis: </tspan>
    <tspan fill="#d86cff" font-weight="900">intentional purpose</tspan>
    <tspan>, programming stability with human empathy, structure with</tspan>
    <tspan x="600" dy="30">intuition, and precision with reflection for the </tspan>
    <tspan fill="#b026ff" font-weight="900">Users</tspan>
    <tspan>.</tspan>
  </text>

  
  <!-- atmosphere labels -->
  <g class="softFloat" opacity="0">
    <g transform="translate(0,10)" stroke="#050008" stroke-width="1.8">
      <text x="600" y="500" text-anchor="middle" font-family="Orbitron, Audiowide, Rajdhani, Arial Black, sans-serif" font-size="25" font-weight="900" letter-spacing="3" fill="#c77dff" filter="url(#redGlow)">MODULARITY · ENCAPSULATION · ORCHESTRATION</text>
    </g>
  </g>
</svg>