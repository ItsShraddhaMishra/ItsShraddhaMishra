<svg width="1200" height="76" viewBox="0 0 1200 76" fill="none" xmlns="http://www.w3.org/2000/svg">
  
  <defs>
    <linearGradient id="section-github-signal_svg_bg" x1="0" y1="0" x2="1200" y2="76" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020202"/>
      <stop offset="0.45" stop-color="#110000"/>
      <stop offset="0.78" stop-color="#2d0000"/>
      <stop offset="1" stop-color="#ff7a00"/>
    </linearGradient>

    <radialGradient id="section-github-signal_svg_wheelGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ff3131" stop-opacity="0.18"/>
      <stop offset="0.55" stop-color="#ff3131" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#ff3131" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="section-github-signal_svg_wheelGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ff7a00" stop-opacity="0.15"/>
      <stop offset="0.65" stop-color="#ff7a00" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ff7a00" stop-opacity="0"/>
    </radialGradient>

    <pattern id="section-github-signal_svg_grid" width="52" height="52" patternUnits="userSpaceOnUse">
      <path d="M 52 0 L 0 0 0 52" fill="none" stroke="#5d0a0a" stroke-width="1" opacity="0.45"/>
    </pattern>

    <linearGradient id="section-github-signal_svg_scanLine" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff3131" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ff3131" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ff3131" stop-opacity="0"/>
    </linearGradient>

    <filter id="section-github-signal_svg_glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="section-github-signal_svg_softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .section-github-signal_svg_scan {
      animation: section-github-signal_svg_scanMove 4.8s linear infinite;
    }

    .section-github-signal_svg_pulse {
      animation: section-github-signal_svg_pulse 2.8s ease-in-out infinite alternate;
    }

    .section-github-signal_svg_pulseSlow {
      animation: section-github-signal_svg_pulseSlow 5.2s ease-in-out infinite alternate;
    }

    .section-github-signal_svg_spinCW {
      transform-origin: 936px 31px;
      animation: section-github-signal_svg_spinCW 16s linear infinite;
    }

    .section-github-signal_svg_spinCCW {
      transform-origin: 936px 31px;
      animation: section-github-signal_svg_spinCCW 22s linear infinite;
    }

    .section-github-signal_svg_spinLeft {
      transform-origin: 216px 53px;
      animation: section-github-signal_svg_spinLeft 18s linear infinite;
    }

    .section-github-signal_svg_dash {
      stroke-dasharray: 14 12;
      animation: section-github-signal_svg_dashMove 4s linear infinite;
    }

    .section-github-signal_svg_float {
      animation: section-github-signal_svg_float 6s ease-in-out infinite alternate;
    }

    @keyframes section-github-signal_svg_scanMove {
      0%   { transform: translateY(-60px); opacity: 0; }
      12%  { opacity: 0.9; }
      50%  { opacity: 0.5; }
      100% { transform: translateY(156px); opacity: 0; }
    }

    @keyframes section-github-signal_svg_pulse {
      0%   { opacity: 0.45; }
      100% { opacity: 1; }
    }

    @keyframes section-github-signal_svg_pulseSlow {
      0%   { opacity: 0.18; }
      100% { opacity: 0.52; }
    }

    @keyframes section-github-signal_svg_spinCW {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes section-github-signal_svg_spinCCW {
      from { transform: rotate(360deg); }
      to   { transform: rotate(0deg); }
    }

    @keyframes section-github-signal_svg_spinLeft {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-360deg); }
    }

    @keyframes section-github-signal_svg_dashMove {
      to { stroke-dashoffset: -120; }
    }

    @keyframes section-github-signal_svg_float {
      0%   { transform: translateX(-12px); opacity: 0.55; }
      100% { transform: translateX(12px); opacity: 0.95; }
    }
  </style>

  <rect width="1200" height="76" fill="url(#section-github-signal_svg_bg)"/>
  <rect width="1200" height="76" fill="url(#section-github-signal_svg_grid)" opacity="0.72"/>

  <rect class="section-github-signal_svg_scan" x="0" y="0" width="1200" height="22" fill="url(#section-github-signal_svg_scanLine)" opacity="0.75"/>

  <!-- ambient glow fields -->
  <circle class="section-github-signal_svg_pulseSlow" cx="936" cy="31" r="27" fill="url(#section-github-signal_svg_wheelGlow)"/>
  <circle class="section-github-signal_svg_pulseSlow" cx="216" cy="53" r="10" fill="url(#section-github-signal_svg_wheelGlow2)"/>

  <!-- main wheel -->
  <g class="section-github-signal_svg_spinCW" opacity="0.15">
    <circle cx="936" cy="31" r="13" fill="none" stroke="#ff3131" stroke-width="2" filter="url(#section-github-signal_svg_glow)"/>
    <circle cx="936" cy="31" r="20" fill="none" stroke="#ff7a00" stroke-width="2" filter="url(#section-github-signal_svg_glow)"/>
    <circle cx="936" cy="31" r="27" fill="none" stroke="#ff3131" stroke-width="1.5" opacity="0.7" filter="url(#section-github-signal_svg_softGlow)"/>

    <line x1="909" y1="31" x2="963" y2="31" stroke="#ff3131" stroke-width="1.5" opacity="0.6"/>
    <line x1="936" y1="4" x2="936" y2="58" stroke="#ff7a00" stroke-width="1.5" opacity="0.6"/>
    <line x1="916" y1="11" x2="956" y2="51" stroke="#ff3131" stroke-width="1.2" opacity="0.45"/>
    <line x1="916" y1="51" x2="956" y2="11" stroke="#ff7a00" stroke-width="1.2" opacity="0.45"/>
  </g>

  <!-- counter-rotating wheel segments -->
  <g class="section-github-signal_svg_spinCCW" opacity="0.15">
    <path d="M 916 31 A 20 20 0 0 1 936 11" fill="none" stroke="#ff3131" stroke-width="3" filter="url(#section-github-signal_svg_glow)"/>
    <path d="M 936 11 A 20 20 0 0 1 956 31" fill="none" stroke="#ff7a00" stroke-width="3" filter="url(#section-github-signal_svg_glow)"/>
    <path d="M 956 31 A 20 20 0 0 1 936 51" fill="none" stroke="#ff3131" stroke-width="3" filter="url(#section-github-signal_svg_glow)"/>
    <path d="M 936 51 A 20 20 0 0 1 916 31" fill="none" stroke="#ff7a00" stroke-width="3" filter="url(#section-github-signal_svg_glow)"/>
  </g>

  <!-- secondary left wheel -->
  <g class="section-github-signal_svg_spinLeft" opacity="0.15">
    <circle cx="216" cy="53" r="10" fill="none" stroke="#ff7a00" stroke-width="1.8" filter="url(#section-github-signal_svg_glow)"/>
    <circle cx="216" cy="53" r="6" fill="none" stroke="#ff3131" stroke-width="1.3" filter="url(#section-github-signal_svg_glow)"/>
    <line x1="206" y1="53" x2="226" y2="53" stroke="#ff7a00" stroke-width="1"/>
    <line x1="216" y1="43" x2="216" y2="63" stroke="#ff3131" stroke-width="1"/>
  </g>

  <!-- horizon / laser terrain -->
  <path class="section-github-signal_svg_pulse" d="M0 60 C 180 53 264 66 432 59 C 660 49 804 65 983 57 C 1104 53 1164 57 1200 51 V 76 H 0 Z"
        fill="#ff3131" opacity="0.10"/>

  <path class="section-github-signal_svg_dash" d="M0 63 C 216 54 312 69 480 61 C 696 50 864 67 1056 60 C 1140 56 1176 54 1200 53"
        fill="none" stroke="#ff3131" stroke-width="2.4" opacity="0.95" filter="url(#section-github-signal_svg_glow)"/>

  <line class="section-github-signal_svg_float" x1="96" y1="13" x2="1104" y2="13" stroke="#ff3131" stroke-width="1.8" opacity="0.65" filter="url(#section-github-signal_svg_glow)"/>
  <line class="section-github-signal_svg_float" x1="192" y1="54" x2="1008" y2="54" stroke="#ff7a00" stroke-width="1.6" opacity="0.55"/>


  <defs>
    <linearGradient id="bar" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a0400" stop-opacity="0.86"/>
      <stop offset="0.5" stop-color="#361000" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#1a0400" stop-opacity="0.86"/>
    </linearGradient>

    <filter id="redGlow" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="violetGlow" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softVioletGlow" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .edge {
      stroke-dasharray: 14 12;
      animation: dashMove 3.8s linear infinite;
    }

    .pulse {
      animation: pulseGlow 2.8s ease-in-out infinite alternate;
    }

    @keyframes dashMove {
      to { stroke-dashoffset: -120; }
    }

    @keyframes pulseGlow {
      0% { opacity: 0.68; }
      100% { opacity: 1; }
    }
  </style>

  <rect x="8" y="8" width="1184" height="60" rx="8" fill="url(#bar)" stroke="#ff7a00" stroke-width="2"/>
  <rect x="8" y="8" width="1184" height="60" rx="8" fill="none" stroke="#ff7a00" stroke-opacity="0.28" stroke-width="1"/>

  <path class="edge" d="M28 38H126" stroke="#ff7a00" stroke-width="3" filter="url(#softGlow)"/>
  <path class="edge" d="M1074 38H1172" stroke="#ff7a00" stroke-width="3" filter="url(#softGlow)"/>

  <g class="pulse">
    <g class="tron-ares-paths" fill="#ff1e1e" filter="url(#redGlow)">
  <path d="M452.745 35.25V43.5H474.465V39.75H460.995V35.25H479.325V48.0H452.385Q447.885 48.0 447.885 43.5V35.25ZM447.885 31.5Q447.885 27.0 452.385 27.0H479.325V31.5Z"/>
  <path d="M487.34499999999997 27.0H492.205V48.0H487.34499999999997Z"/>
  <path d="M510.635 31.5H498.935V27.0H527.1949999999999V31.5H515.495V48.0H510.635Z"/>
  <path d="M557.425 39.75Q552.925 39.75 552.925 35.25H579.865Q584.365 35.25 584.365 39.75V43.5Q584.365 48.0 579.865 48.0H552.925V43.5H579.505V39.75ZM552.925 31.5Q552.925 27.0 557.425 27.0H584.365V31.5Z"/>
  <path d="M592.385 27.0H597.245V48.0H592.385Z"/>
  <path d="M610.125 35.25V43.5H631.845V39.75H618.375V35.25H636.705V48.0H609.765Q605.265 48.0 605.265 43.5V35.25ZM605.265 31.5Q605.265 27.0 609.765 27.0H636.705V31.5Z"/>
  <path d="M644.725 26.85 671.3050000000001 40.32V27.0H676.1650000000001V48.15L649.585 34.95V48.0H644.725Z"/>
  <path d="M698.7650000000001 27.0H703.6850000000001L719.7950000000001 48.0H713.735L710.855 44.1H695.9150000000001L699.2450000000001 39.6H707.5250000000001L701.225 31.080000000000002L688.715 48.0H682.6550000000001Z"/>
  <path d="M731.1450000000001 27.0V43.5H752.9250000000001V48.0H726.2850000000001V27.0Z"/>
</g>
  </g>
</svg>