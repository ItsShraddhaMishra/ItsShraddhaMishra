<svg width="1200" height="76" viewBox="0 0 1200 76" fill="none" xmlns="http://www.w3.org/2000/svg">
  
  <defs>
    <linearGradient id="section-expertise_svg_bg" x1="0" y1="0" x2="1200" y2="76" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020202"/>
      <stop offset="0.45" stop-color="#110000"/>
      <stop offset="0.78" stop-color="#2d0000"/>
      <stop offset="1" stop-color="#ff7a00"/>
    </linearGradient>

    <radialGradient id="section-expertise_svg_wheelGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ff3131" stop-opacity="0.18"/>
      <stop offset="0.55" stop-color="#ff3131" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#ff3131" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="section-expertise_svg_wheelGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ff7a00" stop-opacity="0.15"/>
      <stop offset="0.65" stop-color="#ff7a00" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ff7a00" stop-opacity="0"/>
    </radialGradient>

    <pattern id="section-expertise_svg_grid" width="52" height="52" patternUnits="userSpaceOnUse">
      <path d="M 52 0 L 0 0 0 52" fill="none" stroke="#5d0a0a" stroke-width="1" opacity="0.45"/>
    </pattern>

    <linearGradient id="section-expertise_svg_scanLine" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff3131" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ff3131" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ff3131" stop-opacity="0"/>
    </linearGradient>

    <filter id="section-expertise_svg_glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="section-expertise_svg_softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .section-expertise_svg_scan {
      animation: section-expertise_svg_scanMove 4.8s linear infinite;
    }

    .section-expertise_svg_pulse {
      animation: section-expertise_svg_pulse 2.8s ease-in-out infinite alternate;
    }

    .section-expertise_svg_pulseSlow {
      animation: section-expertise_svg_pulseSlow 5.2s ease-in-out infinite alternate;
    }

    .section-expertise_svg_spinCW {
      transform-origin: 936px 31px;
      animation: section-expertise_svg_spinCW 16s linear infinite;
    }

    .section-expertise_svg_spinCCW {
      transform-origin: 936px 31px;
      animation: section-expertise_svg_spinCCW 22s linear infinite;
    }

    .section-expertise_svg_spinLeft {
      transform-origin: 216px 53px;
      animation: section-expertise_svg_spinLeft 18s linear infinite;
    }

    .section-expertise_svg_dash {
      stroke-dasharray: 14 12;
      animation: section-expertise_svg_dashMove 4s linear infinite;
    }

    .section-expertise_svg_float {
      animation: section-expertise_svg_float 6s ease-in-out infinite alternate;
    }

    @keyframes section-expertise_svg_scanMove {
      0%   { transform: translateY(-60px); opacity: 0; }
      12%  { opacity: 0.9; }
      50%  { opacity: 0.5; }
      100% { transform: translateY(156px); opacity: 0; }
    }

    @keyframes section-expertise_svg_pulse {
      0%   { opacity: 0.45; }
      100% { opacity: 1; }
    }

    @keyframes section-expertise_svg_pulseSlow {
      0%   { opacity: 0.18; }
      100% { opacity: 0.52; }
    }

    @keyframes section-expertise_svg_spinCW {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes section-expertise_svg_spinCCW {
      from { transform: rotate(360deg); }
      to   { transform: rotate(0deg); }
    }

    @keyframes section-expertise_svg_spinLeft {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-360deg); }
    }

    @keyframes section-expertise_svg_dashMove {
      to { stroke-dashoffset: -120; }
    }

    @keyframes section-expertise_svg_float {
      0%   { transform: translateX(-12px); opacity: 0.55; }
      100% { transform: translateX(12px); opacity: 0.95; }
    }
  </style>

  <rect width="1200" height="76" fill="url(#section-expertise_svg_bg)"/>
  <rect width="1200" height="76" fill="url(#section-expertise_svg_grid)" opacity="0.72"/>

  <rect class="section-expertise_svg_scan" x="0" y="0" width="1200" height="22" fill="url(#section-expertise_svg_scanLine)" opacity="0.75"/>

  <!-- ambient glow fields -->
  <circle class="section-expertise_svg_pulseSlow" cx="936" cy="31" r="27" fill="url(#section-expertise_svg_wheelGlow)"/>
  <circle class="section-expertise_svg_pulseSlow" cx="216" cy="53" r="10" fill="url(#section-expertise_svg_wheelGlow2)"/>

  <!-- main wheel -->
  <g class="section-expertise_svg_spinCW" opacity="0.15">
    <circle cx="936" cy="31" r="13" fill="none" stroke="#ff3131" stroke-width="2" filter="url(#section-expertise_svg_glow)"/>
    <circle cx="936" cy="31" r="20" fill="none" stroke="#ff7a00" stroke-width="2" filter="url(#section-expertise_svg_glow)"/>
    <circle cx="936" cy="31" r="27" fill="none" stroke="#ff3131" stroke-width="1.5" opacity="0.7" filter="url(#section-expertise_svg_softGlow)"/>

    <line x1="909" y1="31" x2="963" y2="31" stroke="#ff3131" stroke-width="1.5" opacity="0.6"/>
    <line x1="936" y1="4" x2="936" y2="58" stroke="#ff7a00" stroke-width="1.5" opacity="0.6"/>
    <line x1="916" y1="11" x2="956" y2="51" stroke="#ff3131" stroke-width="1.2" opacity="0.45"/>
    <line x1="916" y1="51" x2="956" y2="11" stroke="#ff7a00" stroke-width="1.2" opacity="0.45"/>
  </g>

  <!-- counter-rotating wheel segments -->
  <g class="section-expertise_svg_spinCCW" opacity="0.15">
    <path d="M 916 31 A 20 20 0 0 1 936 11" fill="none" stroke="#ff3131" stroke-width="3" filter="url(#section-expertise_svg_glow)"/>
    <path d="M 936 11 A 20 20 0 0 1 956 31" fill="none" stroke="#ff7a00" stroke-width="3" filter="url(#section-expertise_svg_glow)"/>
    <path d="M 956 31 A 20 20 0 0 1 936 51" fill="none" stroke="#ff3131" stroke-width="3" filter="url(#section-expertise_svg_glow)"/>
    <path d="M 936 51 A 20 20 0 0 1 916 31" fill="none" stroke="#ff7a00" stroke-width="3" filter="url(#section-expertise_svg_glow)"/>
  </g>

  <!-- secondary left wheel -->
  <g class="section-expertise_svg_spinLeft" opacity="0.15">
    <circle cx="216" cy="53" r="10" fill="none" stroke="#ff7a00" stroke-width="1.8" filter="url(#section-expertise_svg_glow)"/>
    <circle cx="216" cy="53" r="6" fill="none" stroke="#ff3131" stroke-width="1.3" filter="url(#section-expertise_svg_glow)"/>
    <line x1="206" y1="53" x2="226" y2="53" stroke="#ff7a00" stroke-width="1"/>
    <line x1="216" y1="43" x2="216" y2="63" stroke="#ff3131" stroke-width="1"/>
  </g>

  <!-- horizon / laser terrain -->
  <path class="section-expertise_svg_pulse" d="M0 60 C 180 53 264 66 432 59 C 660 49 804 65 983 57 C 1104 53 1164 57 1200 51 V 76 H 0 Z"
        fill="#ff3131" opacity="0.10"/>

  <path class="section-expertise_svg_dash" d="M0 63 C 216 54 312 69 480 61 C 696 50 864 67 1056 60 C 1140 56 1176 54 1200 53"
        fill="none" stroke="#ff3131" stroke-width="2.4" opacity="0.95" filter="url(#section-expertise_svg_glow)"/>

  <line class="section-expertise_svg_float" x1="96" y1="13" x2="1104" y2="13" stroke="#ff3131" stroke-width="1.8" opacity="0.65" filter="url(#section-expertise_svg_glow)"/>
  <line class="section-expertise_svg_float" x1="192" y1="54" x2="1008" y2="54" stroke="#ff7a00" stroke-width="1.6" opacity="0.55"/>


  <defs>
    <linearGradient id="bar" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a0400" stop-opacity="0.86"/>
      <stop offset="0.5" stop-color="#361000" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#1a0400" stop-opacity="0.86"/>
    </linearGradient>

    <filter id="redGlow" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="violetGlow" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softVioletGlow" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .edge {
      stroke-dasharray: 14 12;
      animation: dashMove 3.8s linear infinite;
    }

    .pulse {
      animation: pulseGlow 2.8s ease-in-out infinite alternate;
    }

    @keyframes dashMove {
      to { stroke-dashoffset: -120; }
    }

    @keyframes pulseGlow {
      0% { opacity: 0.68; }
      100% { opacity: 1; }
    }
  </style>

  <rect x="8" y="8" width="1184" height="60" rx="8" fill="url(#bar)" stroke="#ff7a00" stroke-width="2"/>
  <rect x="8" y="8" width="1184" height="60" rx="8" fill="none" stroke="#ff7a00" stroke-opacity="0.28" stroke-width="1"/>

  <path class="edge" d="M28 38H126" stroke="#ff7a00" stroke-width="3" filter="url(#softGlow)"/>
  <path class="edge" d="M1074 38H1172" stroke="#ff7a00" stroke-width="3" filter="url(#softGlow)"/>

  <g class="pulse">
    <g class="tron-ares-paths" fill="#ff1e1e" filter="url(#redGlow)">
  <path d="M468.455 35.25V39.75H449.675V43.5H475.055V48.0H444.815V35.25ZM444.815 31.5V27.0H475.055V31.5Z"/>
  <path d="M494.865 37.5 481.095 27.0H488.595L498.615 34.65L508.635 27.0H516.135L502.365 37.5L516.135 48.0H508.635L498.615 40.35L488.595 48.0H481.095Z"/>
  <path d="M554.065 35.25Q554.065 39.75 549.565 39.75H527.485V48.0H522.625V35.25ZM522.625 31.5V27.0H549.565Q554.065 27.0 554.065 31.5Z"/>
  <path d="M585.725 35.25V39.75H566.945V43.5H592.325V48.0H562.085V35.25ZM562.085 31.5V27.0H592.325V31.5Z"/>
  <path d="M631.335 35.25Q631.335 39.75 626.835 39.75H622.755L631.635 48.0H625.455L616.575 39.75H604.755V48.0H599.895V35.25ZM599.895 31.5V27.0H626.835Q631.335 27.0 631.335 31.5Z"/>
  <path d="M649.765 31.5H638.065V27.0H666.325V31.5H654.625V48.0H649.765Z"/>
  <path d="M673.0550000000001 27.0H677.9150000000001V48.0H673.0550000000001Z"/>
  <path d="M690.4350000000001 39.75Q685.9350000000001 39.75 685.9350000000001 35.25H712.8750000000001Q717.3750000000001 35.25 717.3750000000001 39.75V43.5Q717.3750000000001 48.0 712.8750000000001 48.0H685.9350000000001V43.5H712.5150000000001V39.75ZM685.9350000000001 31.5Q685.9350000000001 27.0 690.4350000000001 27.0H717.3750000000001V31.5Z"/>
  <path d="M749.0350000000001 35.25V39.75H730.2550000000001V43.5H755.6350000000001V48.0H725.3950000000001V35.25ZM725.3950000000001 31.5V27.0H755.6350000000001V31.5Z"/>
</g>
  </g>
</svg>